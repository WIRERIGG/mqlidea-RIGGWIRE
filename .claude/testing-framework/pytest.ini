[tool:pytest]
# Universal PyTest Configuration for Pydantic AI Agents
# Used by: valgrind_memory_ai_agent, never_fail_build_resolver, blitzfire_cpp_optimizer, clang_tidy_ai_agent

# Test discovery
python_files = test_*.py *_test.py tests.py
python_classes = Test* *Tests
python_functions = test_*

# Test paths
testpaths = tests

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers for categorizing tests
markers =
    unit: Unit tests for individual functions and components
    integration: Integration tests for agent workflows
    performance: Performance benchmarking tests
    e2e: End-to-end testing scenarios
    slow: Tests that take longer than 1 second
    requires_api: Tests that require LLM API access
    requires_external: Tests that require external tools (Valgrind, clang-tidy, etc.)
    mock_only: Tests that run entirely with mocks
    coverage_critical: Tests that are critical for coverage requirements

# Output and logging
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=.
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    --cov-fail-under=95
    --junitxml=test_results.xml
    --durations=10
    --maxfail=5

# Coverage configuration
[coverage:run]
branch = True
source = .
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */.venv/*
    */site-packages/*
    */migrations/*
    */settings.py
    */conftest.py
    */setup.py
    */manage.py
    */.claude/*
    */build/*
    */dist/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    pass
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

show_missing = True
skip_covered = False
precision = 2

[coverage:html]
directory = coverage_html
title = Pydantic AI Agents Test Coverage Report

[coverage:xml]
output = coverage.xml