<p>Reports <code>while(true)</code>, <code>while(1)</code>, or <code>for(;;)</code> loops
that do not contain a visible <code>break</code> or <code>return</code> statement.
Such loops may run indefinitely, freezing the terminal and preventing the EA or indicator
from responding to new ticks or user actions.</p>
