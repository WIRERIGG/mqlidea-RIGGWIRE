<h1>int _Digits</h1>
<p><span>The _Digits variable stores number of digits after a decimal point, which defines the price accuracy of the symbol of the current chart. </span></p>
<p><span>You may also use the <a href="/check/digits">Digits()</a> function.</span></p>
