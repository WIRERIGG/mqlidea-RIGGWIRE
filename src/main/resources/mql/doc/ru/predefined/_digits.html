<h1>int _Digits</h1>
<p><span>В переменной _Digits хранится количество десятичных знаков после запятой, определяющее точность измерения цены символа текущего графика. </span></p>
<p><span>Можно также использовать функцию <a href="/check/digits">Digits()</a>.</span></p>
